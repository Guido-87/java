<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fuente estilo ChatGPT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="chat-container">
    <div class="header">Chat IA</div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
        <input id="input" type="text" placeholder="Escribe tu mensaje..." />
        <button id="sendBtn" disabled>Enviar</button>
    </div>
    <div class="donation-box">
        <div class="donation-alias">
            ☕ Apoyar proyecto ☕
        </div>
        <strong class="donation-alias">Alias: Guido-87.mp</strong>
        <a
            href="https://mercadopago.com.ar"
            target="_blank"
            class="donation-link"
        >
            Ir a MercadoPago
        </a>
    </div>
</div>
<script src="/js/chat.js" onerror="handleScriptError()"></script>
</body>
</html>
<script>
function handleScriptError() {
    showError('❌ No se pudo cargar el chat. Revisá tu conexión o recargá la página.');
    disableUI();
}

function showError(msg) {
    const box = document.createElement('div');
    box.style.position = 'fixed';
    box.style.bottom = '10px';
    box.style.left = '10px';
    box.style.background = '#c62828';
    box.style.color = 'white';
    box.style.padding = '10px 14px';
    box.style.borderRadius = '8px';
    box.style.zIndex = '9999';
    box.innerText = msg;
    document.body.appendChild(box);
}

function disableUI() {
    const input = document.querySelector('input');
    const button = document.querySelector('button');
    if (input) input.disabled = true;
    if (button) button.disabled = true;
}
</script>
