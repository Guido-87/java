<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .header {
            padding: 15px;
            background: #020617;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #334155;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        /* 📱 Responsive */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }

            .header {
                font-size: 1rem;
                padding: 10px;
            }

            input {
                font-size: 0.9rem;
            }

            button {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Chat con IA</div>

    <div id="messages" class="messages"></div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Escribe tu mensaje..." />
        <button onclick="send()">Enviar</button>
    </div>
</div>

<script>
    if (!localStorage.getItem("userId")) {
        localStorage.setItem("userId", crypto.randomUUID());
    }

    document.getElementById("input").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            send();
        }
    });

    function addMessage(text, type) {
        const msg = document.createElement("div");
        msg.className = "message " + type;
        msg.innerText = text;
        document.getElementById("messages").appendChild(msg);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }

    async function send() {
        const input = document.getElementById("input");
        const prompt = input.value;

        if (!prompt.trim()) return;

        const userId = localStorage.getItem("userId");

        addMessage(prompt, "user");

        input.value = "";
        input.disabled = true;
        document.querySelector("button").disabled = true;

        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt,
                userId: userId
            })
        });

        const data = await response.text();

        addMessage(data, "bot");

        input.disabled = false;
        document.querySelector("button").disabled = false;
        input.focus();
    }
</script>

</body>
</html>
